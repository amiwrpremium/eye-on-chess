name: CD

on:
  push:
    tags: ["v*"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false # Never cancel a deployment mid-flight

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/eye-on-chess

jobs:
  # ── Build & Push Images ──────────────────────────────
  build-and-push:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: api
            dockerfile: apps/api/Dockerfile.prod
          - image: web
            dockerfile: apps/web/Dockerfile.prod
          - image: worker
            dockerfile: apps/api/Dockerfile.worker
          - image: migrate
            dockerfile: apps/api/Dockerfile.migrate
          - image: admin
            dockerfile: apps/admin/Dockerfile
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        run: docker build -f deployment/Dockerfile.base -t eyeonchess-base .

      - name: Build image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }} \
            -t ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.SITE_URL || 'http://localhost' }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.SITE_URL || 'http://localhost' }} \
            --build-arg NEXT_PUBLIC_ADMIN_URL=${{ secrets.ADMIN_URL || '' }} \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.version.outputs.version }}" \
            .

      - name: Push images
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest

  # ── Deploy to VPS ────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/eyeonchess

            export IMAGE_TAG="${{ steps.version.outputs.version }}"
            COMPOSE="docker compose --env-file .env -f deployment/docker-compose.cd.yml"

            echo "Pulling images (tag: $IMAGE_TAG)..."
            $COMPOSE pull api web worker admin migrate

            echo "Restarting API..."
            $COMPOSE up -d --no-deps api
            sleep 10

            echo "Restarting Web..."
            $COMPOSE up -d --no-deps web
            sleep 5

            echo "Restarting Admin..."
            $COMPOSE up -d --no-deps admin
            sleep 5

            echo "Restarting Worker..."
            $COMPOSE up -d --no-deps worker

            echo "Verifying health..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "Deployment healthy!"
                docker image prune -f
                exit 0
              fi
              echo "Waiting for health... ($i/30)"
              sleep 3
            done

            echo "Health check failed after 90s"
            $COMPOSE logs --tail=50 api web
            exit 1
