name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @eyeonchess/api run db:generate

      - name: ESLint
        run: pnpm lint:eslint

      - name: Prettier
        run: pnpm format:check

      - name: TypeScript (API)
        run: pnpm --filter @eyeonchess/api lint

      - name: TypeScript (Chess)
        run: pnpm --filter @eyeonchess/chess lint

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @eyeonchess/api run db:generate

      - name: Run tests
        run: pnpm test

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t eyeonchess-api .

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t eyeonchess-web .

  build-worker:
    name: Build Worker
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Worker Docker image
        run: docker build -f apps/api/Dockerfile.worker -t eyeonchess-worker .

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    needs: [build-api, build-web, build-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Start services
        run: docker compose -f deployment/docker-compose.dev.yml up --build -d

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 3
          done
          echo "API failed to start"
          docker compose -f deployment/docker-compose.dev.yml logs api --tail 30
          exit 1

      - name: Health check
        run: curl -sf http://localhost:3001/health

      - name: Settings check
        run: curl -sf http://localhost:3001/api/settings

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f deployment/docker-compose.dev.yml logs --tail 50

      - name: Stop services
        if: always()
        run: docker compose -f deployment/docker-compose.dev.yml down -v
