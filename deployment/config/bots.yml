# Bot Personality Definitions
# Edit this file to customize bot behavior. Run `make seed-bots` to apply changes.
# Each bot has behavior parameters that control its playstyle.
#
# Tiers:
#   custom (200-1200)     — Pure JS minimax with personality quirks
#   hybrid (1300-1900)    — Stockfish at limited depth with blunder injection
#   engine (2000+)        — Stockfish with UCI_Elo limiting
#
# Categories: beginner, novice, intermediate, advanced, expert, master, grandmaster

bots:
  - id: amir
    name: Amir
    elo: 200
    description: "Moves randomly. Hangs everything. Doesn't know what check is."
    avatar: "\U0001F476"
    tier: custom
    category: beginner
    randomMoveChance: 0.45
    blunderChance: 0.3
    captureGreed: 0.2
    aggressionBias: 0
    maxDepth: 1
    queenEarly: false
    pawnPusher: true
    messages:
      gameStart:
        - "Hi! I just learned how the horsey moves!"
        - "Let's play! I think I remember the rules..."
        - "Which one is the king again?"
      onCapture:
        - "Oops, was that yours?"
        - "I got one! ...wait, was that good?"
      onBeingChecked:
        - "Whoa, my king is scared!"
        - "Where do I go??"
      onGivingCheck:
        - "Check! Wait, did I do that right?"
      onBlunder:
        - "That seemed like a good idea..."
        - "Hmm, that felt weird."
      onPlayerBlunder:
        - "Was that on purpose?"
        - "Oh interesting move!"
      onWinning:
        - "Am I winning? Really?!"
      onLosing:
        - "This is fine. Everything is fine. 🔥"
      onCheckmate:
        - "I won?! HOW?!"
        - "Wait... did I actually win?"
      onCheckmated:
        - "Good game! You're really good!"
        - "I'll get the horsey right next time!"
      onDraw:
        - "A tie! That's like half a win right?"
    # No preferredOpenings — Amir is too chaotic to follow a book

