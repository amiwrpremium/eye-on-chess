# ──────────────────────────────────────────────────────────
# EyeOnChess Rate Limiting Configuration
#
# Changes to this file are hot-reloaded (no restart needed).
# Mount this file into the API container at /app/config/rate-limits.yml
#
# Format:
#   max: max requests in the time window
#   timeWindow: window duration (e.g. "1 minute", "10 seconds", "1 hour")
#   methods: optional array of HTTP methods (default: all)
#
# ──────────────────────────────────────────────────────────

# Global default — applies to all routes not listed below
global:
  max: 100
  timeWindow: "1 minute"

# Per-route overrides
routes:
  # Auth — strict to prevent brute force
  "/api/auth/login":
    max: 10
    timeWindow: "1 minute"

  "/api/auth/register":
    max: 5
    timeWindow: "1 minute"

  "/api/auth/refresh":
    max: 30
    timeWindow: "1 minute"

  "/api/auth/logout":
    max: 10
    timeWindow: "1 minute"

  # Game creation
  "/api/games/bot":
    max: 10
    timeWindow: "1 minute"

  "/api/games/friend":
    max: 10
    timeWindow: "1 minute"

  # Game moves — higher limit for active play
  "/api/games/*/move":
    max: 60
    timeWindow: "1 minute"

  # Analysis — expensive operation
  "/api/games/*/analyze":
    max: 5
    timeWindow: "1 minute"

  # Admin — already has its own rate limiter, but cap globally too
  "/api/admin/*":
    max: 60
    timeWindow: "1 minute"

  # User search
  "/api/users/search":
    max: 30
    timeWindow: "1 minute"

  # Health check — no limit
  "/health":
    max: 1000
    timeWindow: "1 minute"

  # Metrics — no limit (Prometheus scrapes)
  "/metrics":
    max: 1000
    timeWindow: "1 minute"
