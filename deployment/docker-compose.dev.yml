name: eyeonchess-dev

services:
  # ── Base image (build-only, not a running service) ───
  base:
    image: eyeonchess-base
    build:
      context: ..
      dockerfile: deployment/Dockerfile.base
    profiles: [build]

  # ── Reverse proxy (single entry point) ───────────────
  nginx:
    image: nginx:alpine
    container_name: eyeonchess-dev-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
      - admin
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

  # ── Data stores ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eyeonchess-dev-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eyeonchess
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p2
    container_name: eyeonchess-dev-pgbouncer
    restart: unless-stopped
    ports:
      - "127.0.0.1:6432:6432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'echo ''"postgres" "''$$POSTGRES_PASSWORD''"'' > /etc/pgbouncer/userlist.txt && exec /entrypoint.sh /usr/bin/pgbouncer /etc/pgbouncer/pgbouncer.ini',
      ]
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  redis:
    image: redis:7-alpine
    container_name: eyeonchess-dev-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

  # ── Database migrations + seeds (runs once, then exits) ─
  migrate:
    image: eyeonchess-api
    container_name: eyeonchess-dev-migrate
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: "no"
    env_file:
      - ../.env
    environment:
      DIRECT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/eyeonchess
    command:
      [
        "sh",
        "-c",
        "DATABASE_URL=$${DIRECT_DATABASE_URL} pnpm --filter @eyeonchess/api run db:migrate && DATABASE_URL=$${DIRECT_DATABASE_URL} pnpm --filter @eyeonchess/api run db:seed && DATABASE_URL=$${DIRECT_DATABASE_URL} pnpm --filter @eyeonchess/api run db:seed-bots",
      ]
    volumes:
      - ../apps/api/prisma:/app/apps/api/prisma
      - ./config/bots.yml:/app/config/bots.yml:ro
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started

  # ── Application ──────────────────────────────────────
  api:
    image: eyeonchess-api
    container_name: eyeonchess-dev-api
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/eyeonchess?pgbouncer=true&connection_limit=10
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../apps/api/prisma:/app/apps/api/prisma
      - ../packages/chess/src:/app/packages/chess/src
      - ./config/rate-limits.yml:/app/config/rate-limits.yml:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  worker:
    image: eyeonchess-worker
    container_name: eyeonchess-dev-worker
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/eyeonchess?pgbouncer=true&connection_limit=10
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../apps/api/prisma:/app/apps/api/prisma
      - ../packages/chess/src:/app/packages/chess/src
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  web:
    image: eyeonchess-web
    container_name: eyeonchess-dev-web
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ../.env
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../packages/chess/src:/app/packages/chess/src
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  admin:
    image: eyeonchess-admin
    container_name: eyeonchess-dev-admin
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    env_file:
      - ../.env
    volumes:
      - ../apps/admin/src:/app/apps/admin/src
      - ../packages/ui/src:/app/packages/ui/src
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

volumes:
  pgdata:
    name: eyeonchess-dev-pgdata
