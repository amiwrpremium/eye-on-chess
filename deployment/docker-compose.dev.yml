name: eyeonchess-dev

services:
  # ── Base image (build-only, not a running service) ───
  base:
    image: eyeonchess-base
    build:
      context: ..
      dockerfile: deployment/Dockerfile.base
    profiles: [build]

  # ── Reverse proxy (single entry point) ───────────────
  nginx:
    image: nginx:alpine
    container_name: eyeonchess-dev-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

  # ── Data stores ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eyeonchess-dev-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eyeonchess
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: eyeonchess-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

  # ── Application ──────────────────────────────────────
  api:
    image: eyeonchess-api
    container_name: eyeonchess-dev-api
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../apps/api/prisma:/app/apps/api/prisma
      - ../packages/chess/src:/app/packages/chess/src
      - ./config/rate-limits.yml:/app/config/rate-limits.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  worker:
    image: eyeonchess-worker
    container_name: eyeonchess-dev-worker
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../apps/api/prisma:/app/apps/api/prisma
      - ../packages/chess/src:/app/packages/chess/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  web:
    image: eyeonchess-web
    container_name: eyeonchess-dev-web
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../packages/chess/src:/app/packages/chess/src
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  pgdata:
    name: eyeonchess-dev-pgdata
