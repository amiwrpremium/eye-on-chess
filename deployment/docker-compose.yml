name: eyeonchess

services:
  # ── Base image (build-only) ──────────────────────────
  base:
    image: eyeonchess-base
    build:
      context: ..
      dockerfile: deployment/Dockerfile.base
    profiles: [build]

  # ── Reverse proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eyeonchess-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-}
    entrypoint: ["/bin/sh", "/etc/nginx/nginx-entrypoint.sh"]
    volumes:
      - ./nginx.http.conf:/etc/nginx/http.conf:ro
      - ./nginx.ssl.conf.template:/etc/nginx/templates/ssl.conf.template:ro
      - ./nginx-entrypoint.sh:/etc/nginx/nginx-entrypoint.sh:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

  # ── SSL certificate management ──────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: eyeonchess-certbot
    restart: "no"
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      - ./certbot-init.sh:/opt/certbot-init.sh:ro
    entrypoint: ["/bin/sh", "/opt/certbot-init.sh"]
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
    depends_on:
      - nginx

  # ── Data stores ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eyeonchess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eyeonchess
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p2
    container_name: eyeonchess-pgbouncer
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint:
      [
        "/bin/sh",
        "-c",
        'echo ''"postgres" "''$$POSTGRES_PASSWORD''"'' > /etc/pgbouncer/userlist.txt && exec /entrypoint.sh /usr/bin/pgbouncer /etc/pgbouncer/pgbouncer.ini',
      ]
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 32M

  redis:
    image: redis:7-alpine
    container_name: eyeonchess-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

  # ── Application ──────────────────────────────────────
  api:
    image: eyeonchess-api
    container_name: eyeonchess-api
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/eyeonchess?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/eyeonchess
    volumes:
      - ./config/rate-limits.yml:/app/config/rate-limits.yml:ro
      - ./config/bots.yml:/app/config/bots.yml:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  web:
    image: eyeonchess-web
    container_name: eyeonchess-web
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  worker:
    image: eyeonchess-worker
    container_name: eyeonchess-worker
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/eyeonchess?pgbouncer=true
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  # ── Observability ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: eyeonchess-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  loki:
    image: grafana/loki:3.5.0
    container_name: eyeonchess-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml -config.expand-env=true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M

  promtail:
    image: grafana/promtail:3.5.0
    container_name: eyeonchess-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 32M

  grafana:
    image: grafana/grafana:11.6.0
    container_name: eyeonchess-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

volumes:
  pgdata:
    name: eyeonchess-pgdata
  prometheus_data:
    name: eyeonchess-prometheus-data
  loki_data:
    name: eyeonchess-loki-data
  redis_data:
    name: eyeonchess-redis-data
  grafana_data:
    name: eyeonchess-grafana-data
  certbot-certs:
    name: eyeonchess-certbot-certs
  certbot-webroot:
    name: eyeonchess-certbot-webroot
