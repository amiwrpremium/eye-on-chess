# ── Shared settings ───────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

proxy_buffering on;
proxy_buffer_size 16k;
proxy_buffers 8 16k;

upstream web {
    server web:3000;
}

upstream api {
    server api:3001;
}

upstream grafana_backend {
    server grafana:3000;
}

# ── Main site ─────────────────────────────────────────────
server {
    listen 80;
    server_name ~^(?!grafana\.).*$;

    client_max_body_size 10M;

    # Next.js static assets (immutable — hashed filenames)
    location /_next/static/ {
        proxy_pass http://web;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public static files (icons, sounds, images)
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot|mp3|wav|ogg|wasm)$ {
        proxy_pass http://web;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Bot list (cached — rarely changes)
    location = /api/v1/bots {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=3600";
    }

    # API v1 routes
    location /api/v1/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    # Backward-compat: /api/* → /api/v1/*
    location /api/ {
        rewrite ^/api/(.*)$ /api/v1/$1 permanent;
    }

    # Health check
    location /health {
        proxy_pass http://api;
    }

    # Prometheus metrics
    location /metrics {
        proxy_pass http://api;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Grafana subdomain (grafana.site) ─────────────────────
server {
    listen 80;
    server_name ~^grafana\.;

    client_max_body_size 10M;

    location / {
        proxy_pass http://grafana_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana live WebSocket
    location /api/live/ {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
