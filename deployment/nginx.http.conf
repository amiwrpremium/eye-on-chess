# ── Shared settings ───────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

proxy_buffering on;
proxy_buffer_size 16k;
proxy_buffers 8 16k;

# ── Security headers (applied to all responses) ──────────
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

upstream web {
    server web:3000;
}

upstream api {
    server api:3001;
}

upstream admin {
    server admin:3002;
}

upstream grafana_backend {
    server grafana:3000;
}

# ── Admin subdomain (admin.site) ─────────────────────────
server {
    listen 80;
    server_name ~^admin\.;

    client_max_body_size 10M;

    # Let's Encrypt ACME challenge (for Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API calls from admin
    location /api/v1/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    # Everything else → admin app
    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Main site ─────────────────────────────────────────────
server {
    listen 80;
    server_name ~^(?!grafana\.).*$;

    client_max_body_size 10M;

    # Favicon — proxy once, cache long
    location = /favicon.ico {
        proxy_pass http://web;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    # Next.js static assets (immutable — hashed filenames)
    location /_next/static/ {
        proxy_pass http://web;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public static files (icons, sounds, images)
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot|mp3|wav|ogg|wasm)$ {
        proxy_pass http://web;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Bot list (cached — rarely changes)
    location = /api/v1/bots {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=3600";
    }

    # API v1 routes
    location /api/v1/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store";
    }

    # Backward-compat: /api/* → /api/v1/* (only non-v1 paths)
    location ~ ^/api/(?!v1/) {
        rewrite ^/api/(.*)$ /api/v1/$1 permanent;
    }

    # Health check
    location /health {
        proxy_pass http://api;
    }

    # Prometheus metrics (internal only)
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://api;
    }

    # Socket.io
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Let's Encrypt ACME challenge (for Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Grafana subdomain (grafana.site) ─────────────────────
server {
    listen 80;
    server_name ~^grafana\.;

    client_max_body_size 10M;

    # Let's Encrypt ACME challenge (for Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://grafana_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana live WebSocket
    location /api/live/ {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
